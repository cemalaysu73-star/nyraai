<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#050810">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Nyra">
<link rel="manifest" href="/static/manifest.json">
<title>NYRA</title>
<style>
  :root {
    --cyan: #4fc3f7;
    --cyan-dim: rgba(79,195,247,0.15);
    --cyan-glow: rgba(79,195,247,0.4);
    --bg: #050810;
    --panel: rgba(10,14,28,0.85);
    --text: #e0e8f0;
    --dim: #3a4a5a;
    --green: #4caf50;
    --amber: #ffa726;
    --red: #ef5350;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: var(--bg);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: var(--text);
    user-select: none;
  }

  /* ── Canvas stars ── */
  #stars {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0;
  }

  /* ── Login screen ── */
  #login {
    position: fixed; inset: 0; z-index: 100;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: var(--bg);
    gap: 32px; padding: 40px;
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  #login.hidden { opacity: 0; transform: translateY(-20px); pointer-events: none; }

  .login-logo {
    font-size: 38px; font-weight: 200; letter-spacing: 0.5em;
    color: var(--cyan); text-indent: 0.5em;
    animation: logo-glow 3s ease-in-out infinite alternate;
  }
  @keyframes logo-glow {
    from { text-shadow: 0 0 20px var(--cyan-glow); }
    to   { text-shadow: 0 0 40px var(--cyan-glow), 0 0 80px rgba(79,195,247,0.2); }
  }

  .login-sub {
    font-size: 11px; letter-spacing: 0.3em; color: var(--dim);
    text-transform: uppercase; margin-top: -20px;
  }

  .login-box {
    width: 100%; max-width: 320px;
    background: var(--panel);
    border: 1px solid rgba(79,195,247,0.2);
    border-radius: 16px;
    padding: 28px 24px;
    backdrop-filter: blur(20px);
    display: flex; flex-direction: column; gap: 16px;
  }

  .login-label {
    font-size: 11px; letter-spacing: 0.2em; color: var(--dim);
    text-transform: uppercase;
  }

  .token-input {
    width: 100%; padding: 14px 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(79,195,247,0.3);
    border-radius: 10px;
    color: var(--text); font-size: 15px;
    outline: none; transition: border-color 0.3s;
    -webkit-text-security: disc;
  }
  .token-input:focus { border-color: var(--cyan); }

  .login-btn {
    padding: 14px; border-radius: 10px;
    background: rgba(79,195,247,0.1);
    border: 1px solid var(--cyan);
    color: var(--cyan); font-size: 14px;
    letter-spacing: 0.15em; text-transform: uppercase;
    cursor: pointer; transition: all 0.2s;
  }
  .login-btn:active { background: rgba(79,195,247,0.2); transform: scale(0.98); }

  .login-error {
    font-size: 12px; color: var(--red);
    text-align: center; min-height: 18px;
  }

  /* ── Main app ── */
  #app {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center;
    padding: env(safe-area-inset-top, 12px) 20px env(safe-area-inset-bottom, 20px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.8s ease;
  }
  #app.visible { opacity: 1; pointer-events: all; }

  /* ── Header ── */
  .header {
    width: 100%; display: flex;
    justify-content: space-between; align-items: center;
    padding: 12px 0; flex-shrink: 0;
  }

  .logo-text {
    font-size: 13px; font-weight: 300; letter-spacing: 0.45em;
    color: var(--cyan); text-indent: 0.45em;
  }

  .conn-pill {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 12px; border-radius: 20px;
    background: rgba(79,195,247,0.06);
    border: 1px solid rgba(79,195,247,0.2);
    font-size: 10px; letter-spacing: 0.1em;
    color: var(--dim); transition: all 0.4s;
  }
  .conn-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--dim);
    transition: background 0.4s, box-shadow 0.4s;
  }
  .conn-pill.online .conn-dot {
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: dot-pulse 2s ease-in-out infinite;
  }
  @keyframes dot-pulse {
    0%,100% { opacity: 1; } 50% { opacity: 0.5; }
  }

  /* ── Orb area ── */
  .orb-area {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 0;
  }

  .orb-wrap {
    position: relative;
    width: 280px; height: 280px;
    display: flex; align-items: center; justify-content: center;
  }

  .orb-ring {
    position: absolute; border-radius: 50%;
    border: 1px solid;
    transition: border-color 1s ease;
  }

  .ring-3 {
    width: 270px; height: 270px;
    border-color: rgba(79,195,247,0.10);
    animation: spin-cw 60s linear infinite;
  }
  .ring-2 {
    width: 210px; height: 210px;
    border-color: rgba(79,195,247,0.18);
    border-style: dashed;
    animation: spin-ccw 38s linear infinite;
  }
  .ring-1 {
    width: 155px; height: 155px;
    border-color: rgba(79,195,247,0.30);
    animation: spin-cw 22s linear infinite;
  }
  /* Decorative dots on ring-1 */
  .ring-1::before, .ring-1::after {
    content: '';
    position: absolute; width: 6px; height: 6px;
    border-radius: 50%; background: var(--cyan);
    box-shadow: 0 0 8px var(--cyan);
  }
  .ring-1::before { top: -3px; left: 50%; transform: translateX(-50%); }
  .ring-1::after  { bottom: -3px; left: 50%; transform: translateX(-50%); }

  @keyframes spin-cw  { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes spin-ccw { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }

  .orb-core {
    width: 100px; height: 100px; border-radius: 50%; position: relative;
    background: radial-gradient(circle at 38% 32%, #6dd4f7, #1565c0 45%, #050d2e 80%);
    box-shadow:
      0 0 30px rgba(79,195,247,0.5),
      0 0 60px rgba(79,195,247,0.2),
      0 0 100px rgba(79,195,247,0.1);
    animation: orb-breathe 4s ease-in-out infinite;
    transition: box-shadow 0.6s ease, background 0.6s ease;
  }
  .orb-core::after {
    content: '';
    position: absolute; inset: 15%;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.25), transparent 60%);
  }

  @keyframes orb-breathe {
    0%,100% { transform: scale(1);    box-shadow: 0 0 30px rgba(79,195,247,0.5), 0 0 60px rgba(79,195,247,0.2); }
    50%      { transform: scale(1.06); box-shadow: 0 0 50px rgba(79,195,247,0.7), 0 0 90px rgba(79,195,247,0.3); }
  }

  /* State variants */
  .state-listening .orb-core {
    background: radial-gradient(circle at 38% 32%, #a5d6a7, #2e7d32 45%, #052e05 80%);
    box-shadow: 0 0 40px rgba(76,175,80,0.6), 0 0 80px rgba(76,175,80,0.3);
    animation: orb-breathe-fast 1.4s ease-in-out infinite;
  }
  .state-listening .ring-1 { border-color: rgba(76,175,80,0.4); }
  .state-listening .ring-2 { border-color: rgba(76,175,80,0.25); }

  .state-thinking .orb-core {
    background: radial-gradient(circle at 38% 32%, #ffcc80, #e65100 45%, #2e0a00 80%);
    box-shadow: 0 0 40px rgba(255,167,38,0.6), 0 0 80px rgba(255,167,38,0.3);
    animation: none;
  }
  .state-thinking .ring-1 { animation: spin-cw 6s linear infinite; border-color: rgba(255,167,38,0.4); }
  .state-thinking .ring-2 { animation: spin-ccw 4s linear infinite; border-color: rgba(255,167,38,0.25); }

  .state-speaking .orb-core {
    background: radial-gradient(circle at 38% 32%, #b3e5fc, #0288d1 45%, #011824 80%);
    box-shadow: 0 0 50px rgba(79,195,247,0.8), 0 0 100px rgba(79,195,247,0.4);
    animation: orb-speak 0.8s ease-in-out infinite;
  }
  @keyframes orb-breathe-fast {
    0%,100% { transform: scale(1); } 50% { transform: scale(1.1); }
  }
  @keyframes orb-speak {
    0%,100% { transform: scale(1);    } 25% { transform: scale(1.08); }
    50%      { transform: scale(0.96); } 75% { transform: scale(1.04); }
  }

  /* Status text below orb */
  .status-text {
    margin-top: 28px;
    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--dim); transition: color 0.4s, opacity 0.4s;
    min-height: 16px;
  }
  .state-listening .status-text { color: var(--green); }
  .state-thinking .status-text  { color: var(--amber); }
  .state-speaking .status-text  { color: var(--cyan); }

  /* ── Response card ── */
  .response-wrap {
    width: 100%; max-width: 480px; flex-shrink: 0;
    padding: 0 0 16px;
    min-height: 0;
  }

  .response-card {
    width: 100%;
    background: rgba(8,12,24,0.7);
    border: 1px solid rgba(79,195,247,0.15);
    border-radius: 16px;
    padding: 18px 20px;
    backdrop-filter: blur(20px);
    font-size: 14px; line-height: 1.65;
    color: var(--text);
    min-height: 60px; max-height: 160px;
    overflow-y: auto;
    transition: border-color 0.4s, opacity 0.3s;
    scrollbar-width: none;
  }
  .response-card::-webkit-scrollbar { display: none; }
  .response-card.empty { opacity: 0.4; color: var(--dim); font-style: italic; }

  /* Screenshot */
  #screenshot-wrap {
    width: 100%; border-radius: 12px; overflow: hidden;
    border: 1px solid rgba(79,195,247,0.2);
    margin-bottom: 12px; display: none;
  }
  #screenshot-wrap img { width: 100%; display: block; }

  /* ── Controls ── */
  .controls {
    width: 100%; max-width: 480px;
    display: flex; flex-direction: column;
    align-items: center; gap: 16px;
    flex-shrink: 0; padding-bottom: 8px;
  }

  /* Action row */
  .action-row {
    display: flex; gap: 12px;
    width: 100%; justify-content: center;
  }

  .action-btn {
    flex: 1; max-width: 100px;
    padding: 10px 8px;
    background: rgba(79,195,247,0.05);
    border: 1px solid rgba(79,195,247,0.2);
    border-radius: 12px;
    color: var(--dim); font-size: 10px;
    letter-spacing: 0.12em; text-transform: uppercase;
    cursor: pointer; transition: all 0.2s;
    display: flex; flex-direction: column;
    align-items: center; gap: 5px;
  }
  .action-btn svg { opacity: 0.6; }
  .action-btn:active { background: rgba(79,195,247,0.12); color: var(--cyan); border-color: var(--cyan); transform: scale(0.96); }

  /* Mic button */
  .mic-wrap {
    position: relative; display: flex;
    align-items: center; justify-content: center;
  }

  .mic-ripple {
    position: absolute; width: 80px; height: 80px;
    border-radius: 50%;
    border: 2px solid var(--green);
    opacity: 0; pointer-events: none;
  }
  .listening .mic-ripple {
    animation: ripple-out 1.2s ease-out infinite;
  }
  .listening .mic-ripple:nth-child(2) { animation-delay: 0.4s; }
  .listening .mic-ripple:nth-child(3) { animation-delay: 0.8s; }

  @keyframes ripple-out {
    0%   { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(2.4); opacity: 0; }
  }

  .mic-btn {
    width: 72px; height: 72px; border-radius: 50%;
    background: rgba(79,195,247,0.08);
    border: 2px solid var(--cyan);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; position: relative; z-index: 2;
    box-shadow: 0 0 20px rgba(79,195,247,0.2);
    transition: all 0.25s ease;
  }
  .mic-btn:active { transform: scale(0.93); }
  .mic-btn.listening {
    background: rgba(76,175,80,0.15);
    border-color: var(--green);
    box-shadow: 0 0 30px rgba(76,175,80,0.4);
  }

  .mic-icon { transition: opacity 0.3s; }
  .stop-icon { position: absolute; opacity: 0; transition: opacity 0.3s; }
  .mic-btn.listening .mic-icon { opacity: 0; }
  .mic-btn.listening .stop-icon { opacity: 1; }

  /* Text input row */
  .input-row {
    display: flex; gap: 10px; width: 100%;
  }

  .text-input {
    flex: 1; padding: 13px 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(79,195,247,0.2);
    border-radius: 12px;
    color: var(--text); font-size: 14px;
    outline: none; transition: border-color 0.3s;
  }
  .text-input:focus { border-color: var(--cyan); }
  .text-input::placeholder { color: var(--dim); }

  .send-btn {
    padding: 13px 18px;
    background: rgba(79,195,247,0.1);
    border: 1px solid var(--cyan);
    border-radius: 12px;
    color: var(--cyan); cursor: pointer;
    transition: all 0.2s; font-size: 18px;
    display: flex; align-items: center;
  }
  .send-btn:active { background: rgba(79,195,247,0.2); transform: scale(0.96); }

  /* Typewriter cursor */
  .cursor {
    display: inline-block; width: 2px; height: 14px;
    background: var(--cyan); margin-left: 2px;
    vertical-align: middle;
    animation: blink 0.8s step-end infinite;
  }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
</style>
</head>
<body>

<canvas id="stars"></canvas>

<!-- Login -->
<div id="login">
  <div class="login-logo">NYRA</div>
  <div class="login-sub">Advanced AI System</div>
  <div class="login-box">
    <div class="login-label">Access Token</div>
    <input class="token-input" id="tokenInput" type="password"
           placeholder="Enter your token" autocomplete="off">
    <div class="login-error" id="loginError"></div>
    <button class="login-btn" id="loginBtn">CONNECT</button>
  </div>
</div>

<!-- Main App -->
<div id="app">
  <div class="header">
    <div class="logo-text">NYRA</div>
    <div class="conn-pill" id="connPill">
      <div class="conn-dot"></div>
      <span id="connLabel">Connecting</span>
    </div>
  </div>

  <div class="orb-area" id="orbArea">
    <div class="orb-wrap" id="orbWrap">
      <div class="orb-ring ring-3"></div>
      <div class="orb-ring ring-2"></div>
      <div class="orb-ring ring-1"></div>
      <div class="orb-core"></div>
    </div>
    <div class="status-text" id="statusText">Initializing</div>
  </div>

  <div class="response-wrap">
    <div id="screenshotWrap" style="display:none;margin-bottom:10px;border-radius:12px;overflow:hidden;border:1px solid rgba(79,195,247,0.2)">
      <img id="screenshotImg" style="width:100%;display:block">
    </div>
    <div class="response-card empty" id="responseCard">Awaiting your command, sir.</div>
  </div>

  <div class="controls">
    <div class="action-row">
      <button class="action-btn" onclick="sendCmd('take a screenshot')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8m-4-4v4"/>
        </svg>
        Screen
      </button>
      <button class="action-btn" onclick="sendCmd('task status')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
        </svg>
        Tasks
      </button>
      <button class="action-btn" onclick="sendCmd('what was I doing today')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>
        Log
      </button>
      <button class="action-btn" onclick="sendCmd('volume up')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 010 7.07M19.07 4.93a10 10 0 010 14.14"/>
        </svg>
        Volume
      </button>
    </div>

    <div class="mic-wrap" id="micWrap">
      <div class="mic-ripple"></div>
      <div class="mic-ripple"></div>
      <div class="mic-ripple"></div>
      <button class="mic-btn" id="micBtn" onclick="toggleMic()">
        <svg class="mic-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#4fc3f7" stroke-width="1.8">
          <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
          <path d="M19 10v2a7 7 0 01-14 0v-2M12 19v4M8 23h8"/>
        </svg>
        <svg class="stop-icon" width="24" height="24" viewBox="0 0 24 24" fill="#4caf50">
          <rect x="4" y="4" width="16" height="16" rx="3"/>
        </svg>
      </button>
    </div>

    <div class="input-row">
      <input class="text-input" id="textInput" placeholder="Type a command…"
             autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="send-btn" id="sendBtn" onclick="sendText()">➤</button>
    </div>
  </div>
</div>

<script>
// ── Star field ────────────────────────────────────────────────────────────────
(function() {
  const c = document.getElementById('stars');
  const ctx = c.getContext('2d');
  let W, H, stars = [];

  function resize() {
    W = c.width = window.innerWidth;
    H = c.height = window.innerHeight;
  }

  function mkStar() {
    return {
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.4 + 0.3,
      a: Math.random(),
      da: (Math.random() - 0.5) * 0.008,
      speed: Math.random() * 0.08 + 0.01,
    };
  }

  function init() {
    resize();
    stars = Array.from({length: 220}, mkStar);
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    stars.forEach(s => {
      s.a = Math.max(0.05, Math.min(1, s.a + s.da));
      if (s.a <= 0.05 || s.a >= 1) s.da *= -1;
      s.y -= s.speed;
      if (s.y < 0) { s.y = H; s.x = Math.random() * W; }

      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${s.r > 1.2 ? '150,220,255' : '180,200,240'},${s.a})`;
      ctx.fill();

      if (s.r > 1.3 && s.a > 0.7) {
        ctx.beginPath();
        ctx.moveTo(s.x - s.r * 3, s.y);
        ctx.lineTo(s.x + s.r * 3, s.y);
        ctx.moveTo(s.x, s.y - s.r * 3);
        ctx.lineTo(s.x, s.y + s.r * 3);
        ctx.strokeStyle = `rgba(150,220,255,${s.a * 0.25})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    });
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  init(); draw();
})();

// ── State machine ─────────────────────────────────────────────────────────────
const STATE_LABELS = {
  idle:      'Standing by',
  listening: 'Listening',
  thinking:  'Thinking',
  speaking:  'Speaking',
  offline:   'Offline',
};

let currentState = 'idle';
function setState(s, label) {
  currentState = s;
  const orbArea = document.getElementById('orbArea');
  orbArea.className = 'orb-area state-' + s;
  document.getElementById('statusText').textContent = label || STATE_LABELS[s] || s;
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
let ws = null;
let token = '';
let reconnectTimer = null;

function connect(tok) {
  token = tok;
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws?token=${tok}`);

  ws.onopen = () => {
    clearTimeout(reconnectTimer);
    const pill = document.getElementById('connPill');
    pill.className = 'conn-pill online';
    document.getElementById('connLabel').textContent = 'Online';
    setState('idle');
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'status') {
      setState(msg.state, msg.text);
    } else if (msg.type === 'response') {
      setState('idle');
      showResponse(msg.text);
    } else if (msg.type === 'screenshot') {
      const wrap = document.getElementById('screenshotWrap');
      const img  = document.getElementById('screenshotImg');
      img.src = 'data:image/jpeg;base64,' + msg.data;
      wrap.style.display = 'block';
      if (msg.desc) showResponse(msg.desc);
      setState('idle');
    } else if (msg.type === 'error') {
      showResponse('⚠ ' + msg.text);
      setState('idle');
    } else if (msg.type === 'system_status') {
      showResponse(msg.text);
      setState('idle');
    }
  };

  ws.onclose = (e) => {
    if (e.code === 4001) return; // auth failed
    const pill = document.getElementById('connPill');
    pill.className = 'conn-pill';
    document.getElementById('connLabel').textContent = 'Reconnecting';
    setState('offline', 'Reconnecting…');
    reconnectTimer = setTimeout(() => connect(token), 3000);
  };

  ws.onerror = () => {};
}

function sendCmd(text, lang) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  document.getElementById('screenshotWrap').style.display = 'none';
  ws.send(JSON.stringify({ type: 'command', text, lang: lang || 'en' }));
}

function sendText() {
  const inp = document.getElementById('textInput');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  sendCmd(text);
}

// ── Typewriter response ───────────────────────────────────────────────────────
let typeTimer = null;
function showResponse(text) {
  const card = document.getElementById('responseCard');
  card.className = 'response-card';
  clearTimeout(typeTimer);
  let i = 0;
  card.innerHTML = '';
  const cursor = document.createElement('span');
  cursor.className = 'cursor';

  function tick() {
    if (i < text.length) {
      card.textContent = text.slice(0, ++i);
      card.appendChild(cursor);
      card.scrollTop = card.scrollHeight;
      typeTimer = setTimeout(tick, i < 30 ? 18 : 12);
    } else {
      cursor.remove();
    }
  }
  tick();
}

// ── Voice (Web Speech API) ────────────────────────────────────────────────────
let recognition = null;
let isListening = false;

function toggleMic() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    showResponse('Voice not supported in this browser. Use text input.');
    return;
  }
  if (isListening) {
    recognition && recognition.stop();
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = 'en-US';

  recognition.onstart = () => {
    isListening = true;
    document.getElementById('micBtn').classList.add('listening');
    document.getElementById('micWrap').classList.add('listening');
    setState('listening');
  };

  recognition.onresult = (e) => {
    const text = e.results[0][0].transcript;
    sendCmd(text);
  };

  recognition.onend = () => {
    isListening = false;
    document.getElementById('micBtn').classList.remove('listening');
    document.getElementById('micWrap').classList.remove('listening');
    if (currentState === 'listening') setState('idle');
  };

  recognition.onerror = () => recognition.onend();
  recognition.start();
}

// ── Text input enter key ──────────────────────────────────────────────────────
document.getElementById('textInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendText();
});

// ── Login ─────────────────────────────────────────────────────────────────────
async function tryLogin() {
  const tok = document.getElementById('tokenInput').value.trim();
  if (!tok) { document.getElementById('loginError').textContent = 'Enter your token.'; return; }

  document.getElementById('loginBtn').textContent = 'CONNECTING…';
  document.getElementById('loginError').textContent = '';

  try {
    const res = await fetch(`/token-check?t=${encodeURIComponent(tok)}`);
    const data = await res.json();
    if (data.valid) {
      localStorage.setItem('nyra_token', tok);
      document.getElementById('login').classList.add('hidden');
      const app = document.getElementById('app');
      app.style.pointerEvents = 'all';
      setTimeout(() => app.classList.add('visible'), 50);
      connect(tok);
    } else {
      document.getElementById('loginError').textContent = 'Invalid token.';
      document.getElementById('loginBtn').textContent = 'CONNECT';
    }
  } catch {
    document.getElementById('loginError').textContent = 'Cannot reach Nyra server.';
    document.getElementById('loginBtn').textContent = 'CONNECT';
  }
}

document.getElementById('loginBtn').addEventListener('click', tryLogin);
document.getElementById('tokenInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') tryLogin();
});

// Auto-login: check URL param first (?t=TOKEN), then localStorage
(function () {
  const params = new URLSearchParams(location.search);
  const urlToken = params.get('t');
  if (urlToken) {
    document.getElementById('tokenInput').value = urlToken;
    tryLogin();
  } else {
    const saved = localStorage.getItem('nyra_token');
    if (saved) {
      document.getElementById('tokenInput').value = saved;
      tryLogin();
    }
  }
})();
</script>
